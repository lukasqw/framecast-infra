---
# ClusterRoleBinding para usuários read-only
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: readonly-users
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view # Permissão apenas de visualização
subjects:
  - kind: Group
    name: readonly
    apiGroup: rbac.authorization.k8s.io
