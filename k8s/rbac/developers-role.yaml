---
# ClusterRoleBinding para desenvolvedores (permissões de edição)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: developers
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit # Permissão de edição (não admin)
subjects:
  - kind: Group
    name: developers
    apiGroup: rbac.authorization.k8s.io
