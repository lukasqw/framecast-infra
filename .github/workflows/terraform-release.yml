name: Release - Create Release Branch

on:
  push:
    branches: [develop]
    paths:
      - "terraform/**"
      - "kubernetes/**"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., v1.0.0)"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1

jobs:
  create-release:
    name: Create Release Branch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Generate Version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            # Generate version from date and short SHA
            DATE=$(date +%Y%m%d)
            SHORT_SHA=$(git rev-parse --short HEAD)
            VERSION="release-${DATE}-${SHORT_SHA}"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "branch=release/$VERSION" >> $GITHUB_OUTPUT
          echo "::notice::Release version: $VERSION"

      - name: Create Release Branch
        run: |
          BRANCH="${{ steps.version.outputs.branch }}"

          # Create and push release branch
          git checkout -b "$BRANCH"
          git push origin "$BRANCH"

          echo "::notice::Created branch: $BRANCH"

      - name: Create Pull Request
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const version = '${{ steps.version.outputs.version }}';
            const branch = '${{ steps.version.outputs.branch }}';

            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Release ${version}`,
              head: branch,
              base: 'main',
              body: `## 🚀 Release ${version}
              
              This PR contains infrastructure changes ready for production deployment.
              
              ### Changes
              - Infrastructure updates from develop branch
              - Terraform configuration changes
              - Kubernetes manifests updates
              
              ### Deployment Checklist
              - [ ] Review Terraform plan
              - [ ] Verify cost estimates
              - [ ] Check security scan results
              - [ ] Confirm with team
              - [ ] Merge to trigger production deployment
              
              ### Post-Deployment
              - [ ] Verify infrastructure health
              - [ ] Check application deployment
              - [ ] Monitor logs and metrics
              
              ---
              *Auto-generated by Release workflow*
              *Triggered by: @${{ github.actor }}*
              *Commit: ${{ github.sha }}*`
            });

            console.log(`Created PR #${pr.number}: ${pr.html_url}`);
            core.notice(`Created PR #${pr.number}: ${pr.html_url}`);

            // Add labels
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: ['release', 'infrastructure']
            });

      - name: Release Summary
        run: |
          echo "## 🎉 Release Created" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${{ steps.version.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ steps.version.outputs.branch }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Base | main |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Review the Pull Request" >> $GITHUB_STEP_SUMMARY
          echo "2. Check Terraform plan and cost estimates" >> $GITHUB_STEP_SUMMARY
          echo "3. Merge PR to deploy to production" >> $GITHUB_STEP_SUMMARY
