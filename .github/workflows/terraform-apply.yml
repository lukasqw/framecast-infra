name: Deploy - Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - "kubernetes/**"
      - ".github/workflows/terraform-apply.yml"
  workflow_dispatch:
    inputs:
      auto_approve:
        description: "Auto approve apply"
        required: false
        type: boolean
        default: false
      environment:
        description: "Environment to deploy"
        required: false
        type: choice
        options:
          - production
          - staging
        default: production

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-apply
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.7.0
  NAMESPACE: app-oficina-tech
  ENVIRONMENT: ${{ github.event.inputs.environment || 'production' }}

jobs:
  apply:
    name: Apply Infrastructure
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: ${{ steps.outputs.outputs.alb_url }}
    outputs:
      environment: ${{ env.ENVIRONMENT }}
      rds_endpoint: ${{ steps.outputs.outputs.rds_endpoint }}
      alb_dns: ${{ steps.outputs.outputs.alb_dns }}
      eks_cluster: ${{ steps.outputs.outputs.eks_cluster }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform/production
        run: terraform init

      - name: Terraform Plan
        working-directory: terraform/production
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: terraform/production
        run: |
          if [ "${{ github.event.inputs.auto_approve }}" == "true" ]; then
            terraform apply -auto-approve tfplan
          else
            terraform apply tfplan
          fi

      - name: Get Terraform Outputs
        id: outputs
        working-directory: terraform/production
        run: |
          RDS_ENDPOINT=$(terraform output -raw rds_endpoint 2>/dev/null || echo "")
          RDS_PORT=$(terraform output -raw rds_port 2>/dev/null || echo "5432")
          ALB_DNS=$(terraform output -raw alb_dns_name 2>/dev/null || echo "")
          EKS_CLUSTER=$(terraform output -raw eks_cluster_name 2>/dev/null || echo "")

          echo "rds_endpoint=$RDS_ENDPOINT" >> $GITHUB_OUTPUT
          echo "rds_port=$RDS_PORT" >> $GITHUB_OUTPUT
          echo "alb_dns=$ALB_DNS" >> $GITHUB_OUTPUT
          echo "alb_url=http://$ALB_DNS" >> $GITHUB_OUTPUT
          echo "eks_cluster=$EKS_CLUSTER" >> $GITHUB_OUTPUT

          echo "::notice::RDS Endpoint: $RDS_ENDPOINT:$RDS_PORT"
          echo "::notice::ALB DNS: $ALB_DNS"
          echo "::notice::EKS Cluster: $EKS_CLUSTER"

      - name: Update Kubeconfig
        if: steps.outputs.outputs.eks_cluster != ''
        run: |
          aws eks update-kubeconfig \
            --name ${{ steps.outputs.outputs.eks_cluster }} \
            --region ${{ env.AWS_REGION }}

      - name: Apply Kubernetes Resources
        if: steps.outputs.outputs.eks_cluster != ''
        run: |
          kubectl apply -k kubernetes/overlay

      - name: Update ConfigMap with Infrastructure
        if: steps.outputs.outputs.eks_cluster != ''
        run: |
          kubectl patch configmap oficina-tech-config \
            -n ${{ env.NAMESPACE }} \
            --type merge \
            -p "{\"data\":{\"DB_HOST\":\"${{ steps.outputs.outputs.rds_endpoint }}\",\"DB_PORT\":\"${{ steps.outputs.outputs.rds_port }}\"}}"

      - name: Save Infrastructure Outputs
        run: |
          mkdir -p /tmp/infra-outputs
          cat > /tmp/infra-outputs/${{ env.ENVIRONMENT }}.json <<EOF
          {
            "environment": "${{ env.ENVIRONMENT }}",
            "rds_endpoint": "${{ steps.outputs.outputs.rds_endpoint }}",
            "rds_port": "${{ steps.outputs.outputs.rds_port }}",
            "alb_dns": "${{ steps.outputs.outputs.alb_dns }}",
            "eks_cluster": "${{ steps.outputs.outputs.eks_cluster }}",
            "deployed_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "deployed_by": "${{ github.actor }}",
            "commit_sha": "${{ github.sha }}"
          }
          EOF

      - name: Upload Outputs
        uses: actions/upload-artifact@v4
        with:
          name: infra-outputs-${{ env.ENVIRONMENT }}
          path: /tmp/infra-outputs/${{ env.ENVIRONMENT }}.json
          retention-days: 90

  notify-api-repo:
    name: Notify API Repository
    needs: apply
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Download Outputs
        uses: actions/download-artifact@v4
        with:
          name: infra-outputs-${{ needs.apply.outputs.environment || 'production' }}
          path: /tmp/infra-outputs/

      - name: Trigger API Deployment
        run: |
          ENV="${{ needs.apply.outputs.environment || 'production' }}"
          RDS_ENDPOINT=$(jq -r '.rds_endpoint' /tmp/infra-outputs/${ENV}.json)
          ALB_DNS=$(jq -r '.alb_dns' /tmp/infra-outputs/${ENV}.json)
          EKS_CLUSTER=$(jq -r '.eks_cluster' /tmp/infra-outputs/${ENV}.json)

          curl -X POST \
            -H "Authorization: token ${{ secrets.API_REPO_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ secrets.API_REPO_OWNER }}/oficina-tech-api/dispatches \
            -d "{\"event_type\":\"infrastructure_updated\",\"client_payload\":{\"environment\":\"${ENV}\",\"rds_endpoint\":\"$RDS_ENDPOINT\",\"alb_dns\":\"$ALB_DNS\",\"eks_cluster\":\"$EKS_CLUSTER\"}}"

          echo "::notice::Notified API repo for ${ENV} environment"

  deployment-summary:
    name: Deployment Summary
    needs: [apply, notify-api-repo]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Generate Summary
        run: |
          echo "## 🚀 Infrastructure Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Resource | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ needs.apply.outputs.environment || 'production' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ needs.apply.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| EKS Cluster | ${{ needs.apply.outputs.eks_cluster }} |" >> $GITHUB_STEP_SUMMARY
          echo "| RDS Endpoint | ${{ needs.apply.outputs.rds_endpoint }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ALB DNS | ${{ needs.apply.outputs.alb_dns }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deployed by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "- API deployment triggered automatically" >> $GITHUB_STEP_SUMMARY
          echo "- Monitor application logs" >> $GITHUB_STEP_SUMMARY
          echo "- Verify health checks" >> $GITHUB_STEP_SUMMARY
