name: Destroy Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to destroy'
        required: true
        type: choice
        options:
          - staging
          - production
        default: staging
      confirmation:
        description: 'Type "DESTROY" to confirm'
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-destroy-${{ github.event.inputs.environment }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  ENVIRONMENT: ${{ github.event.inputs.environment }}

jobs:
  destroy:
    name: Destroy â€” ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: ${{ github.event.inputs.environment }}-destroy

    steps:
      - name: Validate Confirmation
        run: |
          if [ "${{ github.event.inputs.confirmation }}" != "DESTROY" ]; then
            echo "::error::Confirmation must be exactly 'DESTROY'"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ vars.TF_VERSION || '1.7.0' }}
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ${{ vars.TF_WORKING_DIR || 'terraform/environments/production' }}
        env:
          TF_BACKEND_BUCKET: ${{ vars.TF_STATE_BUCKET || 'fiap-soat-tf-backend-oficina-tech' }}
          TF_BACKEND_REGION: ${{ env.AWS_REGION }}
        run: |
          if [ -z "$TF_BACKEND_BUCKET" ]; then
            echo "::error::TF_STATE_BUCKET não configurado. Adicione em: Settings → Secrets and variables → Actions → Variables"
            exit 1
          fi
          terraform init \
            -backend-config="bucket=$TF_BACKEND_BUCKET" \
            -backend-config="region=$TF_BACKEND_REGION"

      - name: Scale Down Node Group to Zero
        continue-on-error: true
        run: |
          EKS_CLUSTER=$(cd "${{ vars.TF_WORKING_DIR || 'terraform/environments/production' }}" \
            && terraform output -raw eks_cluster_name 2>/dev/null || echo "")

          if [ -z "$EKS_CLUSTER" ]; then
            echo "Cluster não encontrado, pulando scale-down."
            exit 0
          fi

          NODE_GROUP=$(aws eks list-nodegroups \
            --cluster-name "$EKS_CLUSTER" \
            --region "${{ env.AWS_REGION }}" \
            --query 'nodegroups[0]' --output text 2>/dev/null || echo "")

          if [ -z "$NODE_GROUP" ] || [ "$NODE_GROUP" = "None" ]; then
            echo "Node group não encontrado, pulando scale-down."
            exit 0
          fi

          echo "Escalando $NODE_GROUP para 0 nodes..."
          aws eks update-nodegroup-config \
            --cluster-name "$EKS_CLUSTER" \
            --nodegroup-name "$NODE_GROUP" \
            --scaling-config minSize=0,maxSize=0,desiredSize=0 \
            --region "${{ env.AWS_REGION }}" || true

          echo "Aguardando EC2 terminarem completamente (até 10 min)..."
          for i in $(seq 1 20); do
            NODES=$(aws ec2 describe-instances \
              --filters \
                "Name=tag:eks:cluster-name,Values=$EKS_CLUSTER" \
                "Name=instance-state-name,Values=running,pending,stopping,shutting-down" \
              --query 'length(Reservations[].Instances[])' \
              --output text --region "${{ env.AWS_REGION }}" 2>/dev/null || echo "0")
            echo "Nodes ainda ativos: $NODES"
            [ "$NODES" = "0" ] && break
            sleep 30
          done
          echo "Aguardando 30s para o CNI liberar ENIs..."
          sleep 30

      - name: Delete Orphaned ENIs
        continue-on-error: true
        run: |
          EKS_CLUSTER=$(cd "${{ vars.TF_WORKING_DIR || 'terraform/environments/production' }}" \
            && terraform output -raw eks_cluster_name 2>/dev/null || echo "")

          if [ -z "$EKS_CLUSTER" ]; then
            echo "Cluster não encontrado, pulando limpeza de ENIs."
            exit 0
          fi

          echo "Procurando ENIs orphans do VPC CNI..."

          ENI_BY_TAG=$(aws ec2 describe-network-interfaces \
            --filters \
              "Name=tag:cluster.k8s.amazonaws.com/name,Values=$EKS_CLUSTER" \
              "Name=status,Values=available" \
            --query 'NetworkInterfaces[].NetworkInterfaceId' \
            --output text --region "${{ env.AWS_REGION }}" 2>/dev/null || echo "")

          ENI_BY_DESC=$(aws ec2 describe-network-interfaces \
            --filters \
              "Name=description,Values=aws-K8S-*" \
              "Name=status,Values=available" \
            --query 'NetworkInterfaces[].NetworkInterfaceId' \
            --output text --region "${{ env.AWS_REGION }}" 2>/dev/null || echo "")

          ALL_ENIS=$(echo "$ENI_BY_TAG $ENI_BY_DESC" | tr ' \t' '\n' | sort -u | grep -E '^eni-')

          if [ -z "$ALL_ENIS" ]; then
            echo "Nenhuma ENI orphan encontrada."
            exit 0
          fi

          echo "Deletando ENIs orphans: $ALL_ENIS"
          for ENI in $ALL_ENIS; do
            echo "  → $ENI"
            aws ec2 delete-network-interface \
              --network-interface-id "$ENI" \
              --region "${{ env.AWS_REGION }}" || true
          done

      - name: Delete Kubernetes Resources
        continue-on-error: true
        run: |
          EKS_CLUSTER=$(cd "${{ vars.TF_WORKING_DIR || 'terraform/environments/production' }}" \
            && terraform output -raw eks_cluster_name 2>/dev/null || echo "")

          if [ -n "$EKS_CLUSTER" ]; then
            aws eks update-kubeconfig --name "$EKS_CLUSTER" --region "${{ env.AWS_REGION }}"
            kubectl delete all --all -n ${{ vars.K8S_NAMESPACE || 'app-oficina-tech' }} --ignore-not-found=true || true
            kubectl delete namespace ${{ vars.K8S_NAMESPACE || 'app-oficina-tech' }} --ignore-not-found=true || true
          fi

      - name: Terraform Destroy
        working-directory: ${{ vars.TF_WORKING_DIR || 'terraform/environments/production' }}
        run: terraform destroy -auto-approve
