name: Destroy Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to destroy'
        required: true
        type: choice
        options:
          - staging
          - production
        default: staging
      confirmation:
        description: 'Type "DESTROY" to confirm'
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-destroy-${{ github.event.inputs.environment }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  ENVIRONMENT: ${{ github.event.inputs.environment }}

jobs:
  destroy:
    name: Destroy — ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: ${{ github.event.inputs.environment }}-destroy

    steps:
      - name: Validate Confirmation
        run: |
          if [ "${{ github.event.inputs.confirmation }}" != "DESTROY" ]; then
            echo "::error::Confirmation must be exactly 'DESTROY'"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ vars.TF_VERSION || '1.7.0' }}
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ${{ vars.TF_WORKING_DIR || 'terraform/environments/production' }}
        run: terraform init

      - name: Delete Kubernetes Resources
        continue-on-error: true
        run: |
          EKS_CLUSTER=$(cd "${{ vars.TF_WORKING_DIR || 'terraform/environments/production' }}" \
            && terraform output -raw eks_cluster_name 2>/dev/null || echo "")

          if [ -n "$EKS_CLUSTER" ]; then
            aws eks update-kubeconfig --name "$EKS_CLUSTER" --region "${{ env.AWS_REGION }}"
            kubectl delete all --all -n ${{ vars.K8S_NAMESPACE }} --ignore-not-found=true || true
            kubectl delete namespace ${{ vars.K8S_NAMESPACE }} --ignore-not-found=true || true
          fi

      - name: Terraform Destroy
        working-directory: ${{ vars.TF_WORKING_DIR || 'terraform/environments/production' }}
        run: terraform destroy -auto-approve
