name: Destroy Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to destroy'
        required: true
        type: choice
        options:
          - staging
          - production
        default: staging
      confirmation:
        description: 'Type "DESTROY" to confirm'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: terraform-destroy-${{ github.event.inputs.environment }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  ENVIRONMENT: ${{ github.event.inputs.environment }}
  TF_DIR: ${{ vars.TF_WORKING_DIR || 'terraform/environments/production' }}

jobs:
  destroy:
    name: Destroy — ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: ${{ github.event.inputs.environment }}-destroy

    steps:
      - name: Validate Confirmation
        run: |
          if [ "${{ github.event.inputs.confirmation }}" != "DESTROY" ]; then
            echo "::error::Confirmation must be exactly 'DESTROY'"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ vars.TF_VERSION || '1.7.0' }}
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_BACKEND_BUCKET: ${{ vars.TF_STATE_BUCKET || 'fiap-soat-tf-backend-framecast' }}
          TF_BACKEND_REGION: ${{ env.AWS_REGION }}
        run: |
          if [ -z "$TF_BACKEND_BUCKET" ]; then
            echo "::error::TF_STATE_BUCKET não configurado. Adicione em: Settings → Secrets and variables → Actions → Variables"
            exit 1
          fi
          terraform init \
            -backend-config="bucket=$TF_BACKEND_BUCKET" \
            -backend-config="region=$TF_BACKEND_REGION"

      - name: Get EKS Cluster Name
        id: eks
        working-directory: ${{ env.TF_DIR }}
        run: |
          NAME=$(terraform output -raw eks_cluster_name 2>/dev/null || echo "")
          echo "cluster_name=$NAME" >> $GITHUB_OUTPUT
          if [ -n "$NAME" ]; then
            echo "Cluster encontrado no state: $NAME"
          else
            echo "Nenhum cluster no state — possivelmente já destruído."
          fi

      - name: Remove Datadog Resources from State
        continue-on-error: true
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform state rm 'module.datadog[0]' 2>/dev/null || true

      - name: Terraform Destroy (1ª passagem)
        id: destroy_first
        continue-on-error: true
        working-directory: ${{ env.TF_DIR }}
        run: terraform destroy -auto-approve

      - name: Delete Orphaned ENIs
        if: steps.destroy_first.outcome == 'failure' && steps.eks.outputs.cluster_name != ''
        continue-on-error: true
        env:
          EKS_CLUSTER: ${{ steps.eks.outputs.cluster_name }}
        run: |
          echo "Procurando ENIs orphans do VPC CNI..."

          ENI_BY_TAG=$(aws ec2 describe-network-interfaces \
            --filters \
              "Name=tag:cluster.k8s.amazonaws.com/name,Values=$EKS_CLUSTER" \
              "Name=status,Values=available" \
            --query 'NetworkInterfaces[].NetworkInterfaceId' \
            --output text --region "$AWS_REGION" 2>/dev/null || echo "")

          ENI_BY_DESC=$(aws ec2 describe-network-interfaces \
            --filters \
              "Name=description,Values=aws-K8S-*" \
              "Name=status,Values=available" \
            --query 'NetworkInterfaces[].NetworkInterfaceId' \
            --output text --region "$AWS_REGION" 2>/dev/null || echo "")

          ALL_ENIS=$(echo "$ENI_BY_TAG $ENI_BY_DESC" | tr ' \t' '\n' | sort -u | grep -E '^eni-' || true)

          if [ -z "$ALL_ENIS" ]; then
            echo "Nenhuma ENI orphan encontrada."
            exit 0
          fi

          echo "Deletando ENIs: $ALL_ENIS"
          for ENI in $ALL_ENIS; do
            echo "  → $ENI"
            aws ec2 delete-network-interface \
              --network-interface-id "$ENI" \
              --region "$AWS_REGION" || true
          done

      - name: Terraform Destroy (2ª passagem)
        if: steps.destroy_first.outcome == 'failure'
        working-directory: ${{ env.TF_DIR }}
        run: terraform destroy -auto-approve
