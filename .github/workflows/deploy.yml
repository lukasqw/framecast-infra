name: Deploy

on:
  pull_request:
    types: [ closed ]
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: false
        type: choice
        options:
          - production
          - staging
        default: production

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  ENVIRONMENT: ${{ github.event.inputs.environment || 'production' }}
  # Repository Variables — configure in Settings → Secrets and Variables → Variables
  # Required: AWS_REGION, TF_VERSION, TF_WORKING_DIR, K8S_NAMESPACE
  # Optional: HEALTH_ENDPOINT (default: /health)

jobs:
  # ===========================================
  # STAGE 1: Deploy Infrastructure
  # ===========================================
  deploy:
    name: Deploy Infrastructure
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/'))
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}

    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      eks_cluster: ${{ steps.apply.outputs.eks_cluster }}
      nlb_dns: ${{ steps.apply.outputs.nlb_dns }}
      vpc_id: ${{ steps.apply.outputs.vpc_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Extract Version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TAG=$(git tag --sort=-v:refname | head -n 1 || echo "v0.0.0")
          else
            BRANCH="${{ github.event.pull_request.head.ref }}"
            TAG="${BRANCH#release/}"
          fi
          echo "VERSION=$TAG" >> $GITHUB_OUTPUT
          echo "::notice::Version: $TAG"

      - name: Validate Required Secrets
        run: |
          MISSING=()
          [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ]     && MISSING+=("AWS_ACCESS_KEY_ID")
          [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ] && MISSING+=("AWS_SECRET_ACCESS_KEY")
          [ -z "${{ secrets.DB_PASSWORD }}" ]            && MISSING+=("DB_PASSWORD")
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Required secrets missing: ${MISSING[*]}"
            exit 1
          fi

      - name: Apply Infrastructure
        id: apply
        uses: ./.github/actions/deploy/tf-apply
        with:
          tf_version: ${{ vars.TF_VERSION || '1.7.0' }}
          working_dir: >-
            ${{ env.ENVIRONMENT == 'staging'
              && (vars.TF_WORKING_DIR_STAGING || 'terraform/environments/staging')
              || (vars.TF_WORKING_DIR || 'terraform/environments/production') }}
          tf_state_bucket: ${{ vars.TF_STATE_BUCKET }}
          environment: ${{ env.ENVIRONMENT }}
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_session_token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws_region: ${{ env.AWS_REGION }}
          db_password: ${{ secrets.DB_PASSWORD }}
          dd_api_key: ${{ secrets.DD_API_KEY }}
          dd_app_key: ${{ secrets.DD_APP_KEY }}
          dd_api_url: ${{ secrets.DD_API_URL }}
          k8s_namespace: ${{ vars.K8S_NAMESPACE }}
          plan_sha: ${{ github.event.pull_request.head.sha }}

      - name: Post-Deploy Health Check
        uses: ./.github/actions/deploy/post-check
        with:
          eks_cluster: ${{ steps.apply.outputs.eks_cluster }}
          nlb_dns: ${{ steps.apply.outputs.nlb_dns }}
          aws_region: ${{ env.AWS_REGION }}
          k8s_namespace: ${{ vars.K8S_NAMESPACE }}
          health_endpoint: ${{ vars.HEALTH_ENDPOINT || '/health' }}

      # Tag is created only after a successful health check — a tag represents
      # exactly what is confirmed running in production. Skipped on workflow_dispatch
      # since that redeploys an existing version without creating a new tag.
      - name: Finalize Release Tag
        if: github.event_name != 'workflow_dispatch'
        uses: ./.github/actions/release/finalize-tag
        with:
          version: ${{ steps.version.outputs.VERSION }}

      - name: Deployment Summary
        if: always()
        run: |
          {
            echo "## Deployment Summary"
            echo ""
            echo "| Resource | Value |"
            echo "|----------|-------|"
            echo "| Version | \`${{ steps.version.outputs.VERSION }}\` |"
            echo "| Environment | \`${{ env.ENVIRONMENT }}\` |"
            echo "| EKS Cluster | \`${{ steps.apply.outputs.eks_cluster }}\` |"
            echo "| Region | \`${{ env.AWS_REGION }}\` |"
            echo "| NLB DNS | \`${{ steps.apply.outputs.nlb_dns }}\` |"
            echo "| VPC | \`${{ steps.apply.outputs.vpc_id }}\` |"
            echo ""
            echo "**Endpoints:**"
            echo "- Application: http://${{ steps.apply.outputs.nlb_dns }}"
            echo "- Health: http://${{ steps.apply.outputs.nlb_dns }}${{ vars.HEALTH_ENDPOINT || '/health' }}"
          } >> $GITHUB_STEP_SUMMARY
