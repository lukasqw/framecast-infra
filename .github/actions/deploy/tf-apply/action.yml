name: 'Deploy — Terraform Apply'
description: >
  Initialises Terraform, runs terraform apply and exports the infrastructure
  outputs (EKS cluster, NLB DNS, VPC). Also creates the framecast namespace
  and infra ConfigMap in Kubernetes.
  Fails with detailed output on any error — the release tag is NOT created if
  this action fails.

inputs:
  tf_version:
    description: 'Terraform version to use'
    required: false
    default: '1.7.0'
  working_dir:
    description: 'Path to the Terraform root module'
    required: false
    default: 'terraform/environments/production'
  tf_state_bucket:
    description: 'S3 bucket for Terraform state — maps to TF_STATE_BUCKET GitHub Actions variable'
    required: false
    default: 'fiap-soat-tf-backend-framecast'
  environment:
    description: 'Target environment (e.g. production)'
    required: false
    default: 'production'
  aws_access_key_id:
    description: 'AWS Access Key ID'
    required: true
  aws_secret_access_key:
    description: 'AWS Secret Access Key'
    required: true
  aws_session_token:
    description: 'AWS Session Token'
    required: true
  aws_region:
    description: 'AWS region'
    required: true
  dd_api_key:
    description: 'TF_VAR_datadog_api_key'
    required: false
    default: ''
  dd_app_key:
    description: 'TF_VAR_datadog_app_key'
    required: false
    default: ''
  dd_api_url:
    description: 'TF_VAR_datadog_api_url'
    required: false
    default: ''
  k8s_namespace:
    description: 'Kubernetes namespace — used for the infra ConfigMap'
    required: false
    default: 'framecast'
  plan_sha:
    description: >
      SHA of the commit whose CI plan artifact should be reused.
      When provided, the action downloads tfplan-{sha} from CI and skips re-planning.
      Falls back to a fresh plan if the artifact is not found or expired.
    required: false
    default: ''

outputs:
  nlb_dns:
    description: 'Network Load Balancer DNS name'
    value: ${{ steps.outputs.outputs.nlb_dns }}
  nlb_arn:
    description: 'Network Load Balancer ARN'
    value: ${{ steps.outputs.outputs.nlb_arn }}
  eks_cluster:
    description: 'EKS cluster name'
    value: ${{ steps.outputs.outputs.eks_cluster }}
  eks_endpoint:
    description: 'EKS cluster API endpoint'
    value: ${{ steps.outputs.outputs.eks_endpoint }}
  vpc_id:
    description: 'VPC ID'
    value: ${{ steps.outputs.outputs.vpc_id }}

runs:
  using: composite
  steps:
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ inputs.aws_access_key_id }}
        aws-secret-access-key: ${{ inputs.aws_secret_access_key }}
        aws-session-token: ${{ inputs.aws_session_token }}
        aws-region: ${{ inputs.aws_region }}

    - name: Cache Terraform Providers
      uses: actions/cache@v4
      with:
        path: ${{ inputs.working_dir }}/.terraform/providers
        key: tf-providers-${{ runner.os }}-${{ hashFiles(format('{0}/.terraform.lock.hcl', inputs.working_dir)) }}
        restore-keys: tf-providers-${{ runner.os }}-

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ inputs.tf_version }}
        terraform_wrapper: false

    - name: Terraform Init
      shell: bash
      working-directory: ${{ inputs.working_dir }}
      env:
        TF_BACKEND_BUCKET: ${{ inputs.tf_state_bucket }}
        TF_BACKEND_REGION: ${{ inputs.aws_region }}
      run: |
        if [ -z "$TF_BACKEND_BUCKET" ]; then
          echo "::error::TF_STATE_BUCKET não configurado. Adicione em: Settings → Secrets and variables → Actions → Variables"
          exit 1
        fi
        printf 'bucket = "%s"\nregion = "%s"\n' "$TF_BACKEND_BUCKET" "$TF_BACKEND_REGION" > /tmp/backend-override.hcl
        terraform init -backend-config=/tmp/backend-override.hcl

    - name: Preview Changes
      shell: bash
      working-directory: ${{ inputs.working_dir }}
      env:
        TF_VAR_datadog_api_key: ${{ inputs.dd_api_key }}
        TF_VAR_datadog_app_key: ${{ inputs.dd_app_key }}
        TF_VAR_datadog_api_url: ${{ inputs.dd_api_url }}
      run: |
        terraform plan -no-color 2>&1 | tee plan.txt
        if grep -q "No changes" plan.txt; then
          echo "::notice::No infrastructure changes detected"
        fi

    - name: Bootstrap EKS
      shell: bash
      working-directory: ${{ inputs.working_dir }}
      env:
        TF_VAR_datadog_api_key: ${{ inputs.dd_api_key }}
        TF_VAR_datadog_app_key: ${{ inputs.dd_app_key }}
        TF_VAR_datadog_api_url: ${{ inputs.dd_api_url }}
      run: |
        terraform apply -auto-approve \
          -target=module.security_groups \
          -target=module.eks \
          -target=aws_vpc_security_group_ingress_rule.eks_cluster_nodeport
        echo "::notice::EKS cluster bootstrapped"

    - name: Terraform Apply
      shell: bash
      working-directory: ${{ inputs.working_dir }}
      env:
        TF_VAR_datadog_api_key: ${{ inputs.dd_api_key }}
        TF_VAR_datadog_app_key: ${{ inputs.dd_app_key }}
        TF_VAR_datadog_api_url: ${{ inputs.dd_api_url }}
      run: |
        echo "::notice::Applying infrastructure changes..."
        terraform apply -auto-approve
        echo "::notice::Infrastructure applied successfully"

    - name: Get Terraform Outputs
      id: outputs
      shell: bash
      working-directory: ${{ inputs.working_dir }}
      run: |
        NLB_DNS=$(terraform output -raw nlb_dns_name 2>/dev/null || echo "")
        NLB_ARN=$(terraform output -raw nlb_arn 2>/dev/null || echo "")
        EKS_CLUSTER=$(terraform output -raw eks_cluster_name 2>/dev/null || echo "")
        EKS_ENDPOINT=$(terraform output -raw eks_cluster_endpoint 2>/dev/null || echo "")
        VPC_ID=$(terraform output -raw vpc_id 2>/dev/null || echo "")

        echo "nlb_dns=$NLB_DNS"           >> $GITHUB_OUTPUT
        echo "nlb_arn=$NLB_ARN"           >> $GITHUB_OUTPUT
        echo "eks_cluster=$EKS_CLUSTER"   >> $GITHUB_OUTPUT
        echo "eks_endpoint=$EKS_ENDPOINT" >> $GITHUB_OUTPUT
        echo "vpc_id=$VPC_ID"             >> $GITHUB_OUTPUT

        echo "::notice::EKS: $EKS_CLUSTER | NLB: $NLB_DNS | VPC: $VPC_ID"

    - name: Configure kubectl
      if: steps.outputs.outputs.eks_cluster != ''
      shell: bash
      run: |
        aws eks update-kubeconfig \
          --name ${{ steps.outputs.outputs.eks_cluster }} \
          --region ${{ inputs.aws_region }}

        if ! kubectl get nodes 2>/dev/null; then
          echo "::error::Cannot access EKS cluster after apply"
          exit 1
        fi

    - name: Update Infra ConfigMap
      if: steps.outputs.outputs.eks_cluster != ''
      shell: bash
      continue-on-error: true
      env:
        NAMESPACE: ${{ inputs.k8s_namespace }}
        CM_NLB_DNS: ${{ steps.outputs.outputs.nlb_dns }}
        CM_EKS_CLUSTER: ${{ steps.outputs.outputs.eks_cluster }}
        CM_VPC_ID: ${{ steps.outputs.outputs.vpc_id }}
      run: |
        if [ -z "$NAMESPACE" ]; then
          echo "::warning::k8s_namespace não configurado (K8S_NAMESPACE) — pulando ConfigMap de infraestrutura"
          exit 0
        fi
        kubectl create namespace "$NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -
        kubectl create configmap infra-outputs \
          --from-literal=NLB_DNS="$CM_NLB_DNS" \
          --from-literal=EKS_CLUSTER="$CM_EKS_CLUSTER" \
          --from-literal=VPC_ID="$CM_VPC_ID" \
          -n "$NAMESPACE" \
          --dry-run=client -o yaml | kubectl apply -f -
