name: 'Deploy — Post-Deploy Health Check'
description: >
  Verifies EKS cluster health (nodes ready) and NLB reachability.
  When skip_nlb_http_probe is true (infra-only deploy, no app running),
  only DNS resolution is checked — not HTTP. The HTTP probe only makes
  sense after at least one microservice is deployed behind the NLB.

inputs:
  eks_cluster:
    description: 'EKS cluster name'
    required: true
  nlb_dns:
    description: 'Network Load Balancer DNS name'
    required: true
  aws_region:
    description: 'AWS region'
    required: true
  k8s_namespace:
    description: 'Kubernetes namespace to check pods in'
    required: false
    default: 'framecast'
  health_endpoint:
    description: 'HTTP path to probe on the NLB (used only when skip_nlb_http_probe is false)'
    required: false
    default: '/health'
  skip_nlb_http_probe:
    description: >
      Set to true when no application is deployed yet (e.g. infra-only deploy).
      Skips the HTTP health probe and only verifies DNS resolution of the NLB.
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Check EKS Cluster
      shell: bash
      env:
        CLUSTER: ${{ inputs.eks_cluster }}
        AWS_REGION: ${{ inputs.aws_region }}
        NAMESPACE: ${{ inputs.k8s_namespace }}
      run: |
        echo "::notice::Verifying EKS cluster: $CLUSTER"

        STATUS=$(aws eks describe-cluster \
          --name "$CLUSTER" \
          --region "$AWS_REGION" \
          --query 'cluster.status' \
          --output text 2>/dev/null || echo "UNKNOWN")

        if [ "$STATUS" != "ACTIVE" ]; then
          echo "::error::EKS cluster $CLUSTER is not ACTIVE (status: $STATUS)"
          exit 1
        fi

        aws eks update-kubeconfig --name "$CLUSTER" --region "$AWS_REGION"

        echo "=== Nodes ==="
        if ! kubectl get nodes --request-timeout=30s; then
          echo "::error::Cannot list nodes — cluster may be unreachable"
          exit 1
        fi

        if [ -n "$NAMESPACE" ]; then
          echo ""
          echo "=== Pods in $NAMESPACE ==="
          kubectl get pods -n "$NAMESPACE" --request-timeout=30s || \
            echo "::notice::Namespace $NAMESPACE not yet populated"
        fi

        echo "::notice::EKS cluster is healthy"

    - name: Check NLB Reachability
      shell: bash
      env:
        NLB_DNS: ${{ inputs.nlb_dns }}
        HEALTH_ENDPOINT: ${{ inputs.health_endpoint }}
        SKIP_HTTP: ${{ inputs.skip_nlb_http_probe }}
      run: |
        if [ "$SKIP_HTTP" = "true" ]; then
          echo "::notice::Verificando resolução DNS do NLB (skip_nlb_http_probe=true — nenhuma aplicação deployada ainda)"
          if host "$NLB_DNS" > /dev/null 2>&1 || nslookup "$NLB_DNS" > /dev/null 2>&1; then
            echo "::notice::NLB DNS resolve corretamente: $NLB_DNS"
            exit 0
          else
            echo "::warning::NLB DNS ainda não propaga — normal logo após o provisionamento"
            exit 0
          fi
        fi

        echo "::notice::Probing NLB: http://$NLB_DNS$HEALTH_ENDPOINT"

        MAX_RETRIES=5
        RETRY_DELAY=60

        for i in $(seq 1 $MAX_RETRIES); do
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --connect-timeout 10 \
            --max-time 30 \
            "http://$NLB_DNS$HEALTH_ENDPOINT" || echo "000")

          echo "Attempt $i/$MAX_RETRIES — HTTP status: $HTTP_CODE"

          if [[ "$HTTP_CODE" =~ ^[23] ]]; then
            echo "::notice::NLB responded with HTTP $HTTP_CODE"
            exit 0
          fi

          if [[ "$HTTP_CODE" =~ ^[45] ]]; then
            echo "::warning::NLB returned HTTP $HTTP_CODE — load balancer is reachable but the application may be degraded"
            exit 0
          fi

          if [ "$i" -lt "$MAX_RETRIES" ]; then
            echo "::notice::NLB not yet reachable — retrying in ${RETRY_DELAY}s (attempt $i/$MAX_RETRIES)"
            sleep $RETRY_DELAY
          fi
        done

        echo "::error::NLB is not reachable after $MAX_RETRIES attempts — check security groups and target group health"
        exit 1

    - name: Health Check Summary
      if: always()
      shell: bash
      run: |
        {
          echo "## Post-Deploy Health Check"
          echo ""
          echo "| Check | Tipo |"
          echo "|-------|------|"
          echo "| EKS Cluster | Nodes Ready |"
          echo "| NLB | ${{ inputs.skip_nlb_http_probe == 'true' && 'DNS resolution only' || 'HTTP probe' }} |"
          echo ""
          echo "| Resource | Value |"
          echo "|----------|-------|"
          echo "| Cluster | \`${{ inputs.eks_cluster }}\` |"
          echo "| NLB | \`${{ inputs.nlb_dns }}\` |"
        } >> $GITHUB_STEP_SUMMARY
