name: 'CI — Terraform Security Scan'
description: >
  Runs Trivy and Checkov against the Terraform configuration and uploads
  SARIF results to GitHub Security. Both scanners use soft_fail so the step
  never blocks the workflow — findings are visible in the Security tab.

inputs:
  working_dir:
    description: 'Path to the Terraform root module'
    required: false
    default: 'terraform/environments/production'
  minimum_severity:
    description: 'Minimum severity for findings (LOW | MEDIUM | HIGH | CRITICAL)'
    required: false
    default: 'MEDIUM'
  github_token:
    description: 'GitHub token (kept for backwards compatibility)'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Run Trivy
      id: trivy
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: config
        scan-ref: ${{ inputs.working_dir }}
        format: sarif
        output: trivy-results.sarif
        severity: ${{ inputs.minimum_severity }},HIGH,CRITICAL
        exit-code: '0'

    - name: Upload Trivy SARIF
      if: always() && hashFiles('trivy-results.sarif') != ''
      uses: github/codeql-action/upload-sarif@v4
      continue-on-error: true
      with:
        sarif_file: trivy-results.sarif

    - name: Run Checkov
      id: checkov
      uses: bridgecrewio/checkov-action@v12
      with:
        directory: ${{ inputs.working_dir }}
        framework: terraform
        soft_fail: true
        output_format: sarif
        output_file_path: ./checkov-results.sarif

    - name: Upload Checkov SARIF
      if: always() && hashFiles('checkov-results.sarif') != ''
      uses: github/codeql-action/upload-sarif@v4
      continue-on-error: true
      with:
        sarif_file: checkov-results.sarif

    - name: Security Summary
      if: always()
      shell: bash
      run: |
        {
          echo "## Terraform Security Scan"
          echo ""
          echo "| Scanner | Status |"
          echo "|---------|--------|"
          echo "| Trivy | ${{ steps.trivy.outcome }} |"
          echo "| Checkov | ${{ steps.checkov.outcome }} |"
          echo ""
          echo "Check the **Security** tab for full findings."
        } >> $GITHUB_STEP_SUMMARY
